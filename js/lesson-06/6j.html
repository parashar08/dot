<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>coin-flip game</title>
</head>
<body>
    

    <script>
        const randomNumber = Math.random();
        let result;
        let guess = 'head';

        result = randomNumber < 0.5 ? 'head' : 'tails';

        console.log(guess === result ? 'you win!' : 'you lose!');
    </script>
</body>
</html>
