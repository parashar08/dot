<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" class="input-box">
    <button type="submit" class="submit-button"
        onclick="
            const boxInput = document.querySelector('.input-box').value;
            document.querySelector('.display-message').innerHTML = boxInput;
        "
    >Submit</button>

    <p class="display-message"></p>
</body>
</html>
